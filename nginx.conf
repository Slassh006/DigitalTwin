# ── Reverse Proxy for Digital Twin Backend ───────────────────────────────────
# Handles WebSocket Upgrades (ws:// -> wss://) and standard HTTP routing
# optimized for real-time high-throughput 3D streaming data.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Tuning for low latency WebSocket streaming
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Upstream pointing to the internal Docker container port 8000
    upstream pinn_backend {
        server pinn-server:8000;
    }

    # Upstream pointing to the Next.js Frontend
    upstream frontend {
        server frontend:3000;
    }

    server {
        # Listen on standard HTTP port (can be adapted for 443 SSL using Let's Encrypt)
        listen 80;
        server_name localhost;

        # ── Global Headers ──
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ── Next.js Frontend Routing ──
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── FastAPI Backend Routing ──
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://pinn_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for heavy Physics PDE calculations
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
        }

        # ── WebSocket Streaming Endpoint ──
        location /ws/stream {
            proxy_pass http://pinn_backend/ws/stream;
            proxy_http_version 1.1;
            
            # Crucial: These Headers instruct NGINX to upgrade the HTTP connection to a WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for persistent WebSocket connections during surgery
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }

        # ── Sub-node routing (Federation Simulation) ──
        location /nodes/ {
            proxy_pass http://pinn_backend/nodes/;
            proxy_set_header Host $host;
        }
    }
}
